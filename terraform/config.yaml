
version: 1.0.0

# Init directory name mappings
# These define the actual directory names where init items will be generated
# Supports template variables like {{.GlobalName}}
init:
  # Backend directory init items (prepare: true = run first, e.g. create remote state bucket)
  - name: backend
    prepare: true
    path:
      - terraform/init/main.tf.tmpl
      - terraform/init/variable.tf.tmpl
      - terraform/init/terraform-statestore.tf.tmpl
    destination: terraform/init/0-terraform-statestore/
    args: terraform/init/args.yaml
    install: terraform apply -var-file=terraform/init/0-terraform-statestore/*.tf
    upgrade: terraform apply -var-file=terraform/init/0-terraform-statestore/*.tf
  
  # Projects directory init items
  - name: projects
    path:
      - terraform/init/main.tf.tmpl
      - terraform/init/variable.tf.tmpl
      - terraform/init/terraform-statestore.tf.tmpl
    destination: terraform/init/0-terraform-statestore/
    args: terraform/init/args.yaml
    install: terraform apply -var-file=terraform/init/0-terraform-statestore/*.tf
    upgrade: terraform apply -var-file=terraform/init/0-terraform-statestore/*.tf
  
  # Projects directory init items
  - name: projects
    path:
      - terraform/init/main.tf.tmpl
      - terraform/init/variable.tf.tmpl
      - terraform/init/config.gcs.tfbackend.tmpl
      - terraform/init/projects.tf.tmpl
    destination: terraform/init/1-{{.GlobalName}}-projects/
    args: terraform/init/args.yaml
    install: terraform apply -var-file=terraform/init/1-{{.GlobalName}}-projects/*.tf
    upgrade: terraform apply -var-file=terraform/init/1-{{.GlobalName}}-projects/*.tf
  
  # Atlantis directory init items
  - name: atlantis
    path:
      - terraform/init/main.tf.tmpl
      - terraform/init/config.gcs.tfbackend.tmpl
      - terraform/init/atlantis.tf.tmpl
    destination: terraform/init/2-atlantis/
    args: terraform/init/args.yaml
    install: terraform apply -var-file=terraform/init/2-atlantis/*.tf
    upgrade: terraform apply -var-file=terraform/init/2-atlantis/*.tf

modules:
  - name: gke
    path:
      - terraform/modules/gke
  - name: ssl-certificate
    path:
      - terraform/modules/ssl-certificate
  - name: gke-node-pool
    path:
      - terraform/modules/gke-node-pool
  - name: gke-sm-accessor-sa
    path:
      - terraform/modules/gke-sm-accessor-sa
#  - name: security-policy-corp-ip-whitelist
#    path:
#      - terraform/modules/security-policy-corp-ip-whitelist

# Project-level global parameters
project-global: terraform/project/args.yaml

projects:
  - name: main
    path:
      - terraform/project/main.tf.tmpl
    args: terraform/project/args.yaml
    install: terraform apply -var-file=terraform/project/main.tf.tmpl
    upgrade: terraform apply -var-file=terraform/project/main.tf.tmpl
  - name: modules
    path:
      - terraform/project/modules.tf.tmpl
