version: 1.0.0

# terraform/project/cert 组件的参数定义
# 这些参数用于创建 SSL Certificate、Certificate Map 和 Certificate Map Entry

parameters:
  # 组件级参数（对应 config.yaml projects 中的 cert 组件）
  components:
    cert:
      certificates:
        type: array
        description: "List of SSL certificates to create using ssl-certificate module"
        required: false
        items:
          type: object
          properties:
            name:
              type: string
              description: "Certificate name (used as module identifier)"
              required: true
              pattern: "^[a-z0-9-]+$"
              example: "corp_cert"
            component_name:
              type: string
              description: "Component name for the certificate"
              required: true
              example: "corp"
            domain:
              type: string
              description: "Domain name for the certificate"
              required: true
              example: "corp.example.com"
            dns_zone_name:
              type: string
              description: "Name of the DNS managed zone (must match name in dns component)"
              required: false
              example: "public"
            dns_zone_reference:
              type: string
              description: "Alternative DNS zone reference (e.g., google_dns_managed_zone.public.managed_zone_id)"
              required: false
            zone_project:
              type: string
              description: "Project ID for the DNS zone (defaults to var.project_id if not specified)"
              required: false
              example: "my-project-123"
      
      # 仅 DNS 授权 + 证书（不创建 DNS 记录，需用户在外部 DNS 添加 CNAME）
      dns_authorization_certificates:
        type: array
        description: "Certificates using DNS authorization only (external DNS); no google_dns_record_set created"
        required: false
        default: []
        items:
          type: object
          properties:
            name:
              type: string
              description: "Terraform resource name (e.g. alva_xyz); used in certificate_map_entries"
              pattern: "^[a-z0-9_]+$"
              example: "alva_xyz"
            dns_authorization_name:
              type: string
              description: "GCP resource name for the DNS authorization"
              example: "app-alva-xyz"
            domain:
              type: string
              description: "Domain for DNS authorization"
              example: "alva.xyz"
            managed_domains:
              type: array
              description: "Domains for the managed certificate (e.g. [alva.xyz, *.alva.xyz])"
              items:
                type: string
              example: ["alva.xyz", "*.alva.xyz"]
            description:
              type: string
              required: false

      certificate_maps:
        type: array
        description: "List of certificate maps to create"
        required: false
        items:
          type: object
          properties:
            name:
              type: string
              description: "Certificate map name"
              required: true
              pattern: "^[a-z0-9-]+$"
              example: "main_gateway_map"
            description:
              type: string
              description: "Description of the certificate map"
              required: false
              example: "Main gateway certificate map"
            labels:
              type: object
              description: "Labels for the certificate map"
              required: false
              additionalProperties:
                type: string
      
      certificate_map_entries:
        type: array
        description: "List of certificate map entries to create"
        required: false
        items:
          type: object
          properties:
            name:
              type: string
              description: "Certificate map entry name"
              required: true
              pattern: "^[a-z0-9-]+$"
              example: "wildcard_entry"
            map_name:
              type: string
              description: "Name of the certificate map (must match name in certificate_maps)"
              required: true
              example: "main_gateway_map"
            hostname:
              type: string
              description: "Hostname pattern (e.g., '*.example.com')"
              required: true
              example: "*.example.com"
            certificates:
              type: array
              description: "List of certificate names for module certs (module.<name>_cert.cert_id); use certificate_refs to mix module and dns_authorization certs"
              required: false
              items:
                type: string
              example: ["corp_cert"]
            certificate_refs:
              type: array
              description: "Explicit refs: { type: module|resource, name } - resource = google_certificate_manager_certificate.<name>.id"
              required: false
              items:
                type: object
                properties:
                  type:
                    type: string
                    enum: ["module", "resource"]
                  name:
                    type: string
            description:
              type: string
              description: "Description of the certificate map entry"
              required: false
            matcher:
              type: string
              description: "Matcher for the certificate map entry"
              required: false
              enum: ["PRIMARY", "STORED"]
              example: "PRIMARY"

