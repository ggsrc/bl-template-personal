version: 1.0.0

# terraform/project/vpc 组件的参数定义
# 这些参数用于创建 VPC 网络、子网、NAT、Router、VPC Peering 等配置

parameters:
  # 组件级参数（对应 config.yaml projects 中的 vpc 组件）
  components:
    vpc:
      vpc_name:
        type: string
        description: "VPC network name"
        required: false
        default: "main"
        example: "main"
      
      auto_create_subnetworks:
        type: boolean
        description: "Whether to automatically create subnetworks"
        required: false
        default: false
        example: false
      
      routing_mode:
        type: string
        description: "VPC routing mode"
        required: false
        enum: ["REGIONAL", "GLOBAL"]
        example: "REGIONAL"
      
      description:
        type: string
        description: "Description of the VPC network"
        required: false
        example: "Main VPC network"
      
      # Subnetwork configuration
      subnetwork_name:
        type: string
        description: "Default subnetwork name (used when subnetworks array is not provided)"
        required: false
        example: "us-west-1"
      
      ip_cidr_range:
        type: string
        description: "Default subnetwork CIDR range (used when subnetworks array is not provided)"
        required: false
        example: "10.10.0.0/16"
        pattern: "^([0-9]{1,3}\\.){3}[0-9]{1,3}/[0-9]{1,2}$"
      
      subnetworks:
        type: array
        description: "List of subnetworks to create; name must be a valid Terraform identifier (letters, digits, underscores; avoid hyphens)"
        required: false
        items:
          type: object
          properties:
            name:
              type: string
              description: "Subnetwork resource name (use letters, digits, underscores for Terraform compatibility)"
              required: true
            region:
              type: string
              description: "GCP region for the subnetwork"
              required: true
            ip_cidr_range:
              type: string
              description: "CIDR range for the subnetwork"
              required: true
              pattern: "^([0-9]{1,3}\\.){3}[0-9]{1,3}/[0-9]{1,2}$"
            description:
              type: string
              description: "Description of the subnetwork"
              required: false
            private_ip_google_access:
              type: boolean
              description: "Enable private Google access"
              required: false
              default: false
            secondary_ip_ranges:
              type: array
              description: "Secondary IP ranges for the subnetwork"
              required: false
              items:
                type: object
                properties:
                  range_name:
                    type: string
                    description: "Name of the secondary IP range"
                    required: true
                  ip_cidr_range:
                    type: string
                    description: "CIDR range for the secondary IP range"
                    required: true
                    pattern: "^([0-9]{1,3}\\.){3}[0-9]{1,3}/[0-9]{1,2}$"
      
      # NAT configuration
      enable_nat:
        type: boolean
        description: "Enable Cloud NAT for egress traffic (required for private GKE nodes to pull images)"
        required: false
        default: true
        example: true
      
      nat_router_name:
        type: string
        description: "Name of the Cloud Router for NAT"
        required: false
        default: "gke-egress-router"
        example: "gke-egress-router"
      
      nat_ip_name:
        type: string
        description: "Name of the NAT IP address"
        required: false
        default: "gke-egress-router-nat-ip"
        example: "gke-egress-router-nat-ip"
      
      nat_name:
        type: string
        description: "Name of the Cloud NAT"
        required: false
        default: "gke-egress-router-nat"
        example: "gke-egress-router-nat"
      
      nat_source_subnetworks:
        type: string
        description: "Source subnetwork IP ranges to NAT"
        required: false
        default: "ALL_SUBNETWORKS_ALL_IP_RANGES"
        enum: ["ALL_SUBNETWORKS_ALL_IP_RANGES", "LIST_OF_SUBNETWORKS", "ALL_SUBNETWORKS_ALL_PRIMARY_IP_RANGES"]
        example: "ALL_SUBNETWORKS_ALL_IP_RANGES"
      
      nat_log_enable:
        type: boolean
        description: "Enable NAT logging"
        required: false
        default: false
        example: false
      
      nat_log_filter:
        type: string
        description: "NAT log filter"
        required: false
        default: "ERRORS_ONLY"
        enum: ["ERRORS_ONLY", "TRANSLATIONS_ONLY", "ALL"]
        example: "ERRORS_ONLY"
      
      # Private pool route configuration
      enable_private_pool_route:
        type: boolean
        description: "Enable route for private pool to internet"
        required: false
        default: false
        example: false
      
      private_pool_route_name:
        type: string
        description: "Name of the private pool route"
        required: false
        default: "route-private-pool-to-internet-via-nat"
        example: "route-private-pool-to-internet-via-nat"
      
      private_pool_tags:
        type: array
        description: "Tags for VM instances that use this route"
        required: false
        default: ["gke-private-nat-pool"]
        items:
          type: string
        example: ["gke-private-nat-pool"]
      
      private_pool_route_priority:
        type: integer
        description: "Priority of the private pool route (lower number = higher priority)"
        required: false
        default: 900
        example: 900
      
      # Private service networking configuration
      enable_private_service_networking:
        type: boolean
        description: "Enable private service networking connection"
        required: false
        default: false
        example: false
      
      private_conn_ip_name:
        type: string
        description: "Name of the private connection IP allocation"
        required: false
        default: "private-conn-alloc"
        example: "private-conn-alloc"
      
      private_conn_prefix_length:
        type: integer
        description: "Prefix length for private connection IP allocation"
        required: false
        default: 16
        example: 16
      
      # VPC Peering configuration
      vpc_peerings:
        type: array
        description: "List of VPC peering connections"
        required: false
        items:
          type: object
          properties:
            name:
              type: string
              description: "Name of the VPC peering connection"
              required: true
            peer_network:
              type: string
              description: "Full URL of the peer network (e.g., https://www.googleapis.com/compute/v1/projects/PROJECT_ID/global/networks/NETWORK_NAME)"
              required: true
            export_custom_routes:
              type: boolean
              description: "Export custom routes to peer network"
              required: false
              default: true
            import_custom_routes:
              type: boolean
              description: "Import custom routes from peer network"
              required: false
              default: true

