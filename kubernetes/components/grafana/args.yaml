version: 1.0.0

# kubernetes/components/grafana 组件的参数定义
# 典型变量：image.tag、grafana.ini.server.root_url、datasources、plugins、auth.google

parameters:
  components:
    grafana:
      namespace:
        type: string
        description: "Namespace to install Grafana"
        required: false
        default: "grafana"
      releaseName:
        type: string
        description: "Helm release name"
        required: false
        default: "grafana"
      valuesFiles:
        type: string
        description: "Space-separated values files. Use values.yaml values-corp.yaml after rendering values-corp.yaml.tmpl"
        required: false
        default: "values.yaml values-corp.yaml"
      # values-corp.yaml.tmpl 渲染参数
      imageTag:
        type: string
        description: "Grafana image tag"
        required: false
        default: "12.3.1"
      replicas:
        type: integer
        description: "Grafana replica count"
        required: false
        default: 1
      persistenceSize:
        type: string
        description: "PVC size for Grafana persistence"
        required: false
        default: "10Gi"
      vmDatasourceUrl:
        type: string
        description: "VictoriaMetrics datasource URL (Prometheus endpoint)"
        required: false
        default: "http://vmselect-victoriametrics-vmks.monitoring-vm.svc.cluster.local:8481/select/0/prometheus"
      lokiDatasourceUrl:
        type: string
        description: "Loki datasource URL"
        required: false
        default: "http://loki-gateway.loki.svc.cluster.local"
      rootUrl:
        type: string
        description: "Grafana server root_url (e.g. https://example.com/grafana)"
        required: false
        default: "https://example.com/grafana"
      hostedDomain:
        type: string
        description: "Google auth hosted_domain"
        required: false
        default: "example.com"
      # 安装脚本会检查 helm/kubectl 是否存在；若设置则同时校验最低版本
      minHelmVersion:
        type: string
        description: "Minimum helm version required by install script (e.g. 3.0). Empty = only check presence"
        required: false
        default: ""
      minKubectlVersion:
        type: string
        description: "Minimum kubectl version required by install script (e.g. 1.24). Empty = only check presence"
        required: false
        default: ""
