apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: istio-rules
  namespace: monitoring-vm
spec:
  groups:
  - name: Istio Exporter
    rules:
      - alert: IstioHigh4xxErrorRate
        expr:
          'sum(rate(istio_requests_total{reporter="destination", response_code=~"4.*"}[5m])) /
          sum(rate(istio_requests_total{reporter="destination"}[5m])) * 100 > 5'
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: Istio high 4xx error rate (instance {{ $labels.instance }})
          description:
            "High percentage of HTTP 4xx responses in Istio (> 5%).\n  VALUE = {{ $value
            }}\n  LABELS = {{ $labels }}"

      - alert: IstioHigh5xxErrorRate
        expr:
          'sum(rate(istio_requests_total{reporter="destination", response_code=~"5.*"}[5m])) /
          sum(rate(istio_requests_total{reporter="destination"}[5m])) * 100 > 5'
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: Istio high 5xx error rate (instance {{ $labels.instance }})
          description:
            "High percentage of HTTP 5xx responses in Istio (> 5%).\n  VALUE = {{ $value
            }}\n  LABELS = {{ $labels }}"
