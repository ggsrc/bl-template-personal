version: 1.0.0

# kubernetes/components/victoria-metrics-operator 组件的参数定义
# 环境变量参考：example/alva/k8s/common/victoria-metrics/values-stg.yaml, values-prd.yaml
# 典型差异：cluster/env (externalLabels)、remoteWrite URL、vmagent resources

parameters:
  components:
    victoria-metrics-operator:
      namespace:
        type: string
        description: "Namespace to install Victoria Metrics K8s Stack"
        required: false
        default: "monitoring-vm"
      releaseName:
        type: string
        description: "Helm release name"
        required: false
        default: "victoriametrics"
      valuesFiles:
        type: string
        description: "Space-separated values files. Use values.yaml values-override.yaml when using rendered override"
        required: false
        default: "values.yaml values-override.yaml"
      # values-override.yaml.tmpl 渲染参数
      cluster:
        type: string
        description: "Cluster label for vmagent externalLabels (e.g. stg, prd)"
        required: false
        default: "stg"
      env:
        type: string
        description: "Env label for vmagent externalLabels"
        required: false
        default: "stg"
      remoteWriteUrl:
        type: string
        description: "VMAgent remote write URL (e.g. http://vminsert:8480/insert/0/prometheus/api/v1/write)"
        required: false
        default: "http://10.10.0.8:8480/insert/0/prometheus/api/v1/write"
      scrapeInterval:
        type: string
        description: "VMAgent scrape interval"
        required: false
        default: "20s"
      vmagentCpuLimit:
        type: string
        description: "VMAgent resources limits cpu"
        required: false
        default: "2"
      vmagentMemoryLimit:
        type: string
        description: "VMAgent resources limits memory"
        required: false
        default: "2Gi"
      vmagentCpuRequest:
        type: string
        description: "VMAgent resources requests cpu"
        required: false
        default: "500m"
      vmagentMemoryRequest:
        type: string
        description: "VMAgent resources requests memory"
        required: false
        default: "500Mi"
      # 安装脚本会检查 helm/kubectl 是否存在；若设置则同时校验最低版本
      minHelmVersion:
        type: string
        description: "Minimum helm version required by install script (e.g. 3.0). Empty = only check presence"
        required: false
        default: ""
      minKubectlVersion:
        type: string
        description: "Minimum kubectl version required by install script (e.g. 1.24). Empty = only check presence"
        required: false
        default: ""
