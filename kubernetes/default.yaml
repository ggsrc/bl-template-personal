# Profile: minimal (default) — lightweight platform for personal / AI-assisted development.
# Only Sealed Secrets controller; deploy apps with kubectl/helm.
# For Istio + monitoring stack use: blcli init-args --profile full

version: 1.0.0
global: {}
projects:
  - name: app
    components:
      - name: sealed-secret
        parameters:
          namespace: sealed-secret
          controller-manifest-url: https://github.com/bitnami-labs/sealed-secrets/releases/download/v0.32.2/controller.yaml
