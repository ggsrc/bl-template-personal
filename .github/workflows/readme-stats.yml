name: Update README stats

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-adoption:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update adoption snapshot in README files
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"
          STARS=$(gh api "repos/${REPO}" --jq '.stargazers_count')
          FORKS=$(gh api "repos/${REPO}" --jq '.forks_count')
          UPDATED=$(date -u +"%Y-%m-%d")

          export EN_LINE="**Adoption snapshot (${UPDATED}):** ${STARS} GitHub stars · ${FORKS} forks · powered by [blcli](https://github.com/ggsrc/blcli)"
          export ZH_LINE="**采用情况（${UPDATED}）：** ${STARS} GitHub Stars · ${FORKS} Forks · 配合 [blcli](https://github.com/ggsrc/blcli) 使用"

          python3 <<'PY'
          import os
          import pathlib
          import re

          en_line = os.environ["EN_LINE"]
          zh_line = os.environ["ZH_LINE"]

          def replace_block(path: str, marker: str, new_content: str) -> None:
              p = pathlib.Path(path)
              text = p.read_text(encoding="utf-8")
              pattern = rf"<!-- {marker}:START -->\n.*?\n<!-- {marker}:END -->"
              replacement = f"<!-- {marker}:START -->\n{new_content}\n<!-- {marker}:END -->"
              updated, count = re.subn(pattern, replacement, text, count=1, flags=re.DOTALL)
              if count != 1:
                  raise SystemExit(f"{marker} block not found in {path}")
              p.write_text(updated, encoding="utf-8")

          replace_block("README.md", "ADOPTION", en_line)
          replace_block("README_zh.md", "ADOPTION", zh_line)

          readme_md = pathlib.Path("README.md").read_text(encoding="utf-8")
          adopters_match = re.search(
              r"<!-- ADOPTERS:START -->\n.*?\n<!-- ADOPTERS:END -->",
              readme_md,
              flags=re.DOTALL,
          )
          if adopters_match:
              inner = adopters_match.group(0)
              inner_body = re.sub(r"<!-- ADOPTERS:START -->\n?", "", inner)
              inner_body = re.sub(r"\n?<!-- ADOPTERS:END -->", "", inner_body)
              replace_block("README_zh.md", "ADOPTERS", inner_body.rstrip("\n"))
          PY

      - name: Commit and push if changed
        run: |
          if git diff --quiet README.md README_zh.md; then
            echo "No README changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md README_zh.md
          git commit -m "chore: update README adoption stats"
          git push
